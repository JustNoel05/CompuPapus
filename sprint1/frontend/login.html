<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetDecision — Login (Sprint 1)</title>
  <style>
    body    { font-family: Arial, sans-serif; background: #0a0c0f; color: #e8eaf0;
              display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card   { background: #111418; border: 1px solid #2a2f3a; border-radius: 12px;
              padding: 32px; width: 360px; }
    h2      { color: #f0c040; text-align: center; margin: 0 0 24px; letter-spacing: 2px; }
    .tabs   { display: flex; margin-bottom: 20px; background: #0a0c0f; border-radius: 6px; padding: 4px; }
    .tab    { flex: 1; padding: 8px; border: none; background: transparent; color: #8892a4;
              cursor: pointer; border-radius: 4px; font-weight: bold; }
    .tab.active { background: #161b22; color: #f0c040; }
    .form   { display: none; }
    .form.active { display: block; }
    label   { display: block; font-size: 0.8rem; color: #8892a4; margin-bottom: 4px; text-transform: uppercase; }
    input   { width: 100%; background: #161b22; border: 1px solid #2a2f3a; border-radius: 6px;
              padding: 10px; color: #e8eaf0; font-size: 1rem; box-sizing: border-box; margin-bottom: 14px; }
    input:focus { border-color: #f0c040; outline: none; }
    button.primary { width: 100%; background: #f0c040; color: #0a0c0f; border: none;
              border-radius: 6px; padding: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; }
    #msg    { text-align: center; margin-top: 12px; font-size: 0.85rem; min-height: 20px; }
    .ok     { color: #00e676; }
    .err    { color: #ff3d57; }
    .aviso  { color: #8892a4; font-size: 0.75rem; text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🎯 BETDECISION</h2>

    <div class="tabs">
      <button class="tab active" onclick="cambiarTab('login')">Iniciar Sesión</button>
      <button class="tab"        onclick="cambiarTab('registro')">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div class="form active" id="form-login">
      <label>Correo</label>
      <input type="email" id="login-correo" placeholder="tu@correo.com" />
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••" />
      <button class="primary" onclick="handleLogin()">ENTRAR</button>
    </div>

    <!-- REGISTRO -->
    <div class="form" id="form-registro">
      <label>Nombre</label>
      <input type="text" id="reg-nombre" placeholder="Tu nombre" />
      <label>Correo</label>
      <input type="email" id="reg-correo" placeholder="tu@correo.com" />
      <label>Contraseña</label>
      <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" />
      <button class="primary" onclick="handleRegistro()">CREAR CUENTA</button>
    </div>

    <div id="msg"></div>
    <p class="aviso">Proyecto académico IL355 — UdG CUCEI 2026<br>Sprint 1</p>
  </div>

  <script>
    const API = 'http://localhost:8000';

    function cambiarTab(tab) {
      document.querySelectorAll('.tab').forEach(b  => b.classList.remove('active'));
      document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('form-' + tab).classList.add('active');
      document.getElementById('msg').textContent = '';
    }

    function msg(texto, tipo) {
      const el = document.getElementById('msg');
      el.textContent = texto;
      el.className = tipo;
    }

    async function handleLogin() {
      const correo = document.getElementById('login-correo').value.trim();
      const pass   = document.getElementById('login-pass').value;
      if (!correo || !pass) { msg('Completa todos los campos', 'err'); return; }

      try {
        const res  = await fetch(API + '/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ correo, password: pass })
        });
        const data = await res.json();

        if (data.ok) {
          sessionStorage.setItem('sora_user', JSON.stringify({ id: data.id, nombre: data.nombre }));
          msg('¡Bienvenido, ' + data.nombre + '!', 'ok');
          setTimeout(() => location.href = '/partidos-page', 800);
        } else {
          msg(data.detail || 'Credenciales incorrectas', 'err');
        }
      } catch (e) {
        msg('Error de conexión. ¿Está corriendo uvicorn?', 'err');
      }
    }

    async function handleRegistro() {
      const nombre = document.getElementById('reg-nombre').value.trim();
      const correo = document.getElementById('reg-correo').value.trim();
      const pass   = document.getElementById('reg-pass').value;

      if (!nombre || !correo || !pass) { msg('Completa todos los campos', 'err'); return; }
      if (pass.length < 6)             { msg('Contraseña mínimo 6 caracteres', 'err'); return; }

      try {
        const res  = await fetch(API + '/registro', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, correo, password: pass })
        });
        const data = await res.json();

        if (data.ok) {
          msg('Cuenta creada. Iniciando sesión...', 'ok');
          // Auto-login después del registro
          const login = await fetch(API + '/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ correo, password: pass })
          });
          const sesion = await login.json();
          if (sesion.ok) {
            sessionStorage.setItem('sora_user', JSON.stringify({ id: sesion.id, nombre: sesion.nombre }));
            setTimeout(() => location.href = '/partidos-page', 800);
          }
        } else {
          msg(data.detail || 'Error al registrar', 'err');
        }
      } catch (e) {
        msg('Error de conexión. ¿Está corriendo uvicorn?', 'err');
      }
    }

    // Enter para enviar
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const activo = document.querySelector('.form.active').id;
        if (activo === 'form-login')    handleLogin();
        if (activo === 'form-registro') handleRegistro();
      }
    });
  </script>
</body>
</html>
